services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: remote_term
      POSTGRES_USER: remote_term
      POSTGRES_PASSWORD: remote_term
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remote_term -d remote_term"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:

